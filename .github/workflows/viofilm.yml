name: 🎬 Vio Film Publisher

on:
  schedule:
    # ظهر ۱۲:۳۰ به وقت ایران (UTC 9:00)
    - cron: '30 9 * * *'
    # شب ۲۱:۳۰ به وقت ایران (UTC 18:00)
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: 📥 دریافت کد
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🐍 نصب پایتون
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📦 نصب بسته‌ها
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 🎬 اجرای ربات
      env:
        VIOFILM_BOT_TOKEN: ${{ secrets.VIOFILM_BOT_TOKEN }}
        VIOFILM_CHAT_ID: ${{ secrets.VIOFILM_CHAT_ID }}
        TZ: 'Asia/Tehran'
      run: python main.py
    
    - name: 💾 ذخیره تاریخچه
      if: always()
      run: |
        git config user.name 'VioFilm Bot'
        git config user.email 'bot@viofilm.ir'
        mkdir -p data
        touch data/movie_history.json
        git add data/movie_history.json
        git diff --staged --quiet || git commit -m "📊 بروزرسانی تاریخچه فیلم‌ها" || true
        git pull --rebase || true
        git push || echo "✅ تاریخچه ذخیره شد"
