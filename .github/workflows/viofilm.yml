name: 🎬 Vio Film Publisher

on:
  schedule:
    # ظهر ۱۲:۳۰
    - cron: '0 9 * * *'
    # شب ۲۱:۳۰
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📦 نصب بسته‌ها
      run: pip install -r requirements.txt
    
    - name: 🎬 اجرا
      env:
        VIOFILM_BOT_TOKEN: ${{ secrets.VIOFILM_BOT_TOKEN }}
        VIOFILM_CHAT_ID: ${{ secrets.VIOFILM_CHAT_ID }}
        TZ: 'Asia/Tehran'
      run: python main.py
    
    - name: 💾 ذخیره
      if: always()
      run: |
        git config user.name 'VioFilm Bot'
        git config user.email 'bot@viofilm.ir'
        git add data/history.json
        git diff --staged --quiet || git commit -m "📊 بروزرسانی"
        git pull --rebase
        git push || echo "OK"
